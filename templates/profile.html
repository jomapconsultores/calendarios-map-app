{% extends "base.html" %}
{% block title %}Mi perfil - calendarios-map{% endblock %}
{% block page_title %}Mi perfil{% endblock %}
{% block page_sub %}<p class="page-sub">Actualiza tus datos personales</p>{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card"><div class="card-body p-4">
      <h5 class="section-heading">👤 Datos de la cuenta</h5>
      <form method="POST">
        <div class="mb-3"><label class="form-label">Nombre completo</label><input name="full_name" class="form-control" value="{{current_user.full_name}}"></div>
        <div class="mb-3"><label class="form-label">Email</label><input name="email" type="email" class="form-control" value="{{current_user.email}}"></div>
        <div class="mb-3"><label class="form-label">Nueva contraseña</label><input name="password" type="password" class="form-control" placeholder="Dejar vacío para no cambiar…"></div>
        <button type="submit" class="btn btn-primary rounded-pill w-100">💾 Guardar cambios</button>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
