<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Mi Perfil - calendarios-map</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f8f9fc;font-family:'Segoe UI',sans-serif}.navbar{background:linear-gradient(135deg,#4e73df,#224abe)!important}.card{border-radius:12px;border:none;box-shadow:0 .15rem 1.75rem rgba(0,0,0,.05)}</style></head>
<body>
<nav class="navbar navbar-dark"><div class="container-fluid">
<a class="navbar-brand" href="/dashboard">🗓️ calendarios-map</a>
<div><span class="text-white me-3 small">{{current_user.full_name}}</span>
<a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill me-1">📊 Panel</a>
<a href="/calendar" class="btn btn-light btn-sm rounded-pill me-1">📅 Calendario</a>
<a href="/logout" class="btn btn-outline-light btn-sm rounded-pill">Salir</a></div></div></nav>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-6">
<div class="card"><div class="card-body p-4"><h3>👤 Mi Perfil</h3>
{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for cat, msg in messages %}
<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}{% endif %}{% endwith %}
<form method="POST">
<div class="mb-3"><label class="form-label">Nombre completo</label><input name="full_name" class="form-control" value="{{current_user.full_name}}"></div>
<div class="mb-3"><label class="form-label">Email</label><input name="email" type="email" class="form-control" value="{{current_user.email}}"></div>
<div class="mb-3"><label class="form-label">Nueva contraseña (dejar vacío)</label><input name="password" type="password" class="form-control" placeholder="Nueva contraseña..."></div>
<button type="submit" class="btn btn-primary rounded-pill w-100">💾 Guardar Cambios</button></form></div></div></div></div></div></body></html>
