<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión · calendarios-map</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;text-align:center;padding:24px;}
    .box{max-width:340px}
    .ico{font-size:3rem;margin-bottom:12px}
    h1{font-size:1.3rem;margin:0 0 8px}
    p{opacity:.85;font-size:.95rem;line-height:1.5}
    button{margin-top:18px;border:0;border-radius:999px;padding:12px 22px;font-weight:700;cursor:pointer;
      background:#fff;color:#4f46e5;}
  </style>
</head>
<body>
  <div class="box">
    <div class="ico">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay internet en este momento. Revisa tu conexión y vuelve a intentar.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
